name: Gemini AI Developer
on:
  push:
    paths:
      - 'todo/*.md'

jobs:
  gemini-job:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Execute AI Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_CLI_TRUST_WORKSPACE: true
        run: |
          # Read the specific task file
          PROMPT_CONTENT=$(cat todo/current_task.md)
          
          npx @google/gemini-cli "CONTEXT: You are a GitHub automation bot.
          TASK DETAILS FROM FILE: $PROMPT_CONTENT
          
          GOAL: Create a new branch, add the requested changes, and push. 
          COMMANDS: Run only the git commands and file edits necessary to finish in one turn." --approval-mode=yolo
