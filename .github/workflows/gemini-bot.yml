name: Gemini AI Developer
on:
  issue_comment:
    types: [created]

jobs:
  gemini-job:
    # SECURITY: Only triggers if the comment starts with the command 
    # AND the user is the Repo Owner or a Collaborator.
    if: |
      contains(github.event.comment.body, '@gemini /fix') && 
      (github.event.comment.author_association == 'OWNER' || 
       github.event.comment.author_association == 'COLLABORATOR')
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so the AI can see the code

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Execute AI Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_CLI_TRUST_WORKSPACE: true
        run: |
          npx @google/gemini-cli "CONTEXT: You are a GitHub automation bot.
          ISSUE: ${{ github.event.issue.title }}
          
          GOAL: Create a new branch, add the requested changes, and push. 
          DO NOT use 'search' or 'list' tools. 
          DO NOT ask for clarification.
          COMMANDS: Run only the git commands and file edits necessary to finish in one turn." --approval-mode=yolo
