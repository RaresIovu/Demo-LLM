name: Gemini AI Developer
on:
  issue_comment:
    types: [created]

jobs:
  gemini-job:
    # SECURITY: Only triggers if the comment starts with the command 
    # AND the user is the Repo Owner or a Collaborator.
    if: |
      contains(github.event.comment.body, '@gemini /fix') && 
      (github.event.comment.author_association == 'OWNER' || 
       github.event.comment.author_association == 'COLLABORATOR')
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so the AI can see the code

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Execute AI Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use npx to avoid installation overhead
          # Added --max-turns=2 to prevent the AI from looping and hitting quotas
          npx @google/gemini-cli "I need to fix an issue. 
          Title: ${{ github.event.issue.title }}
          Body: ${{ github.event.issue.body }}
          
          STRICT RULES:
          1. Create a new branch.
          2. Create/modify the necessary files.
          3. Commit and push immediately.
          4. Do NOT perform extra searches or lists." --approval-mode=yolo --max-turns=2
